<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="display">결과는 대기 중...</h1>

    <script>
        // 1. 파이썬 데이터를 가져오는 "가짜" 함수를 만듭니다.
        async function getGesture() {
            try {
                // 파이썬의 /get_gesture_data 주소에 접속해서 데이터를 가져옴
                const response = await fetch('/get_gesture_data');
                const data = await response.json();
                
                // 파이썬이 보낸 'result' 값을 리턴
                return data.result; 
            } catch (e) {
                return "Error";
            }
        }

        // 2. setInterval에서는 위에서 만든 함수를 사용합니다.
        setInterval(async () => {
            // 파이썬 함수(통로)를 통해 값을 받아옴
            const result = await getGesture(); 
            
            // 받아온 값을 화면에 출력
            document.getElementById('display').innerText = "결과는 " + result;
        }, 100); // 0.1초마다 반복
    </script>
</body>
</html>
